<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- SLOT:TITLE -->设计方案<!-- /SLOT:TITLE --></title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafbfc; --surface: #fff; --border: #e5e7eb; --border-l: #f0f1f3;
    --text: #1a1a2e; --muted: #6b7280; --accent: #2563eb; --green: #059669;
    --radius: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; -webkit-font-smoothing: antialiased; }
  .container { max-width: 960px; margin: 0 auto; padding: 0 32px; }

  /* ---- Header ---- */
  .report-header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); color: #fff; padding: 64px 0 48px; }
  .report-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .report-header .subtitle { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
  .report-meta { display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: rgba(255,255,255,0.6); }
  .report-meta span { display: flex; align-items: center; gap: 6px; }

  /* ---- Section ---- */
  section { padding: 48px 0 0; }
  .section-num { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 4px; }
  .section-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .section-desc { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
  .section-divider { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: 32px; }

  /* ---- Slot (工程层：AI 填充锚点，展示层不可见) ---- */
  .slot { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 20px; }
  .slot h3 { font-size: 17px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .placeholder { background: #f8f9fb; border: 1px dashed var(--border); border-radius: 8px; padding: 20px 24px; color: var(--muted); font-size: 14px; font-style: italic; text-align: center; }
  /* 填充后 placeholder 被替换，slot 看起来像普通内容卡片 */

  /* ---- Tables ---- */
  .info-table { width: 100%; border-collapse: collapse; }
  .info-table th { text-align: left; padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--muted); background: #f8f9fb; border-bottom: 1px solid var(--border); }
  .info-table td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid var(--border-l); }

  /* ---- Content items ---- */
  .content-item { padding: 10px 0; border-bottom: 1px solid var(--border-l); font-size: 14px; }
  .content-item:last-child { border-bottom: none; }

  /* ---- Source footnote (降级展示，不抢视觉) ---- */
  .source-note { font-size: 11px; color: #9ca3af; margin-top: 4px; }

  /* ---- Flow nodes ---- */
  .flow-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
  .flow-node { padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff; }
  .flow-node.new { background: var(--accent); }
  .flow-node.reuse { background: var(--green); }
  .flow-arrow { color: var(--muted); font-size: 18px; }

  /* ---- Check items ---- */
  .check-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border-l); }
  .check-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
  .check-item p { font-size: 14px; }

  /* ---- Pending items (替代 KB Gap) ---- */
  .pending-item { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px; padding: 14px 16px; margin: 8px 0; }
  .pending-item h4 { font-size: 13px; font-weight: 600; color: #92400E; margin-bottom: 4px; }
  .pending-item p { font-size: 13px; color: #78350F; }

  /* ---- Reference cards (附录) ---- */
  .ref-card { display: flex; gap: 12px; padding: 14px 16px; background: #f8f9fb; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; align-items: flex-start; }
  .ref-card img { width: 48px; height: 104px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); flex-shrink: 0; }
  .ref-card h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .ref-card p { font-size: 12px; color: var(--muted); }

  /* ---- Phone mockup ---- */
  .phone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 32px; margin: 24px 0; }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; }
  .phone-label { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .phone-sublabel { font-size: 12px; color: var(--muted); margin-bottom: 12px; text-align: center; }
  .phone-frame { width: 280px; border: 2px solid #1a1a2e; border-radius: 32px; overflow: hidden; background: #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .phone-screen { width: 100%; aspect-ratio: 375/812; overflow: hidden; position: relative; font-family: -apple-system, 'PingFang SC', sans-serif; }

  .page-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-new { background: rgba(37,99,235,0.1); color: var(--accent); }
  .tag-reuse { background: rgba(5,150,105,0.1); color: var(--green); }

  /* ---- Appendix ---- */
  .appendix-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
